kind = "web"
previewPath = "/"
title = "JobQuest — AI Job Platform"
version = "1.0.0"
id = "artifacts/job-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24090

[services.development]
run = "pnpm --filter @workspace/job-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/job-platform", "run", "build" ]
publicDir = "artifacts/job-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24090"
BASE_PATH = "/"
